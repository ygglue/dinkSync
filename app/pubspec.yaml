name: dinksync
description: "dinkSync — pickleball social app + CRM (MVP)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.8.0

  # Routing
  go_router: ^14.6.0

  # State management
  flutter_riverpod: ^2.6.1

  # Config / env
  flutter_dotenv: ^5.2.1

  # Typography (Plus Jakarta Sans headlines + Inter body — design system)
  google_fonts: ^6.2.1

  # Local persistence (remembers Play/Management mode)
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
